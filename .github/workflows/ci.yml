name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Algorithm unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest pytest-cov
          # Pillow + PyYAML needed only for map_generator, not for unit tests
          pip install Pillow PyYAML

      - name: Generate maps (smoke-test map_generator)
        run: |
          cd multi_robot_coverage
          python -m multi_robot_coverage.map_generator

      - name: Run unit tests
        run: |
          cd multi_robot_coverage
          pytest test/ -v --tb=short --cov=multi_robot_coverage/algorithms --cov-report=term-missing

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 multi_robot_coverage/multi_robot_coverage/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__
